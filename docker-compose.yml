name: ${COMPOSE_PROJECT_NAME:-papps-outline}

services:
  redis:
    profiles:
      - dev
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_BIND:-127.0.0.1:16379}:6379"
    user: "redis:redis"

  postgres:
    profiles:
      - dev
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT_BIND:-127.0.0.1:15432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-outline}
    user: "postgres:postgres"

  outline:
    profiles:
      - prod
    image: ${OUTLINE_IMAGE:-papps-outline:prod}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${OUTLINE_BASE_IMAGE:-papps-outline-base:prod}
        CDN_URL: ${CDN_URL:-}
    container_name: ${OUTLINE_CONTAINER_NAME:-papps-outline-app}
    restart: unless-stopped
    depends_on:
      outline-postgres:
        condition: service_healthy
      outline-redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      URL: ${URL:-https://docs.precisionlab.co}
      PORT: ${PORT:-3000}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      UTILS_SECRET: ${UTILS_SECRET:-change-me}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en_US}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      DATABASE_URL: ${DATABASE_URL:-postgres://outline:outline@outline-postgres:5432/outline}
      DATABASE_CONNECTION_POOL_MIN: ${DATABASE_CONNECTION_POOL_MIN:-}
      DATABASE_CONNECTION_POOL_MAX: ${DATABASE_CONNECTION_POOL_MAX:-}
      PGSSLMODE: ${PGSSLMODE:-disable}
      REDIS_URL: ${REDIS_URL:-redis://outline-redis:6379}
      REDIS_COLLABORATION_URL: ${REDIS_COLLABORATION_URL:-}
      FILE_STORAGE: ${FILE_STORAGE:-s3}
      FILE_STORAGE_UPLOAD_MAX_SIZE: ${FILE_STORAGE_UPLOAD_MAX_SIZE:-262144000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_UPLOAD_BUCKET_URL: ${AWS_S3_UPLOAD_BUCKET_URL:-}
      AWS_S3_UPLOAD_BUCKET_NAME: ${AWS_S3_UPLOAD_BUCKET_NAME:-}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
      AWS_S3_ACL: ${AWS_S3_ACL:-private}
      FORCE_HTTPS: ${FORCE_HTTPS:-true}
      PROXY_HEADERS_TRUSTED: ${PROXY_HEADERS_TRUSTED:-true}
      RATE_LIMITER_ENABLED: ${RATE_LIMITER_ENABLED:-true}
      RATE_LIMITER_REQUESTS: ${RATE_LIMITER_REQUESTS:-1000}
      RATE_LIMITER_DURATION_WINDOW: ${RATE_LIMITER_DURATION_WINDOW:-60}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_DISPLAY_NAME: ${OIDC_DISPLAY_NAME:-PrecisionLab SSO}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      SMTP_SERVICE: ${SMTP_SERVICE:-}
      SMTP_NAME: ${SMTP_NAME:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_REPLY_EMAIL: ${SMTP_REPLY_EMAIL:-}
      SMTP_TLS_CIPHERS: ${SMTP_TLS_CIPHERS:-}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_DISABLE_STARTTLS: ${SMTP_DISABLE_STARTTLS:-false}
      ENABLE_UPDATES: ${ENABLE_UPDATES:-true}
      DEBUG: ${DEBUG:-http}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3000"
    networks:
      edge_proxy:
        aliases:
          - outline-app
      outline_internal:
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/_health | grep -q OK"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 1m

  outline-postgres:
    profiles:
      - prod
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-papps-outline-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-outline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-outline}
      POSTGRES_DB: ${POSTGRES_DB:-outline}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      outline_internal:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outline} -d ${POSTGRES_DB:-outline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  outline-redis:
    profiles:
      - prod
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-papps-outline-redis}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      outline_internal:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  outline-base:
    profiles:
      - build
    image: ${OUTLINE_BASE_IMAGE:-papps-outline-base:prod}
    build:
      context: .
      dockerfile: Dockerfile.base
      args:
        CDN_URL: ${CDN_URL:-}

networks:
  edge_proxy:
    external: true
    name: ${EDGE_PROXY_NETWORK:-edge_proxy}
  outline_internal:
    name: ${OUTLINE_INTERNAL_NETWORK:-papps-outline-internal}
    internal: true

volumes:
  postgres-data:
  redis-data:
